<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Radar — qui est sur la carte ?</title>
  <meta name="description" content="Apparais sur le radar et vois en direct tous ceux qui ont accepté de partager leur position. Rien n'est enregistré : tu fermes, tu disparais.">
  <meta property="og:title" content="Radar — qui est sur la carte ?">
  <meta property="og:description" content="Partage ta position en direct et vois qui d'autre est sur le radar. Éphémère : tu fermes la page, tu disparais.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://770lab.com/radar/">
  <meta name="theme-color" content="#e8edf3">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>">
  <link rel="stylesheet" href="css/style.css?v=10">
</head>
<body>

  <!-- Carte plein écran -->
  <div id="map" aria-label="Carte des personnes connectées"></div>

  <!-- HUD haut -->
  <header id="hud" class="hidden">
    <div class="hud-brand">
      <span class="hud-dot"></span>
      <span class="hud-title">RADAR</span>
    </div>
    <div class="hud-right">
      <span id="hud-count" class="hud-count">—</span>
      <button id="btn-test" class="hud-btn hud-btn-test" title="Ajouter un point de test" aria-label="Ajouter un point de test">＋</button>
      <button id="btn-share" class="hud-btn" title="Partager le lien" aria-label="Partager le lien">⇗</button>
      <button id="btn-center" class="hud-btn" title="Me recentrer" aria-label="Me recentrer">◎</button>
      <button id="btn-quit" class="hud-btn hud-btn-quit" title="Quitter le radar" aria-label="Quitter le radar">✕</button>
    </div>
  </header>

  <!-- Boîte « point de test » (adresse à rejoindre) -->
  <div id="testbox" class="hidden">
    <!-- Le composant Google PlaceAutocompleteElement est injecté ici -->
    <div class="testbox-row" id="test-ac-slot"></div>
    <div class="testbox-foot">
      <span id="test-status" class="test-status">Un point « Test » apparaîtra à cette adresse, clique-le pour t’y rendre.</span>
      <button id="test-remove" class="test-remove hidden" type="button">Retirer le point Test</button>
    </div>
  </div>

  <!-- Bandeau rendez-vous (au-dessus du roster) -->
  <div id="meetup" class="hidden">
    <span id="meet-dot" class="meet-dot">🎯</span>
    <div class="meet-text">
      <div id="meet-name" class="meet-name"></div>
      <div id="meet-sub" class="meet-sub"></div>
    </div>
    <button id="meet-close" class="meet-close" type="button" title="Annuler le rendez-vous" aria-label="Annuler le rendez-vous">✕</button>
  </div>

  <!-- Liste des présents (bas) -->
  <div id="roster" class="hidden" aria-label="Personnes sur le radar"></div>

  <!-- Toasts -->
  <div id="toasts" aria-live="polite"></div>

  <!-- Écran d'accueil -->
  <div id="gate">
    <div class="gate-inner">
      <div class="radar-scope" aria-hidden="true">
        <div class="scope-ring r1"></div>
        <div class="scope-ring r2"></div>
        <div class="scope-ring r3"></div>
        <div class="scope-cross"></div>
        <div class="scope-sweep"></div>
        <div class="scope-blip b1"></div>
        <div class="scope-blip b2"></div>
        <div class="scope-blip b3"></div>
      </div>
      <h1 class="gate-title">RADAR</h1>
      <p class="gate-sub">La carte de ceux qui sont là, <em>en&nbsp;direct</em>.</p>
      <p id="gate-count" class="gate-count">Connexion au radar…</p>

      <label class="gate-label" for="callsign">Ton indicatif</label>
      <div class="gate-name-row">
        <input id="callsign" type="text" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Indicatif">
        <button id="btn-reroll" type="button" title="Autre indicatif" aria-label="Générer un autre indicatif">⟳</button>
      </div>

      <button id="btn-join" class="gate-join">Apparaître sur le radar</button>
      <p id="gate-error" class="gate-error hidden"></p>

      <p class="gate-privacy">
        Ta position n'est visible que <strong>tant que la page est ouverte</strong>.<br>
        Tu fermes → tu disparais. Rien n'est enregistré.
      </p>
    </div>
  </div>

  <script src="js/config.js?v=2"></script>
  <!-- Loader officiel Google Maps (charge maps/marker/places/geometry à la demande) -->
  <script>
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({key:(window.RADAR_CONFIG||{}).mapsKey,v:"weekly",language:"fr",region:"FR"});
  </script>
  <script src="vendor/firebase/firebase-app-compat.js"></script>
  <script src="vendor/firebase/firebase-auth-compat.js"></script>
  <script src="vendor/firebase/firebase-database-compat.js"></script>
  <script src="js/app.js?v=11"></script>
</body>
</html>
